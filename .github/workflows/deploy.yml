name: Deploy Thirdsan Panel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, sqlite3, tokenizer, xml, ctype, json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Install Node dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

      - name: Verify the app boots
        run: |
          cp .env.example .env
          php artisan key:generate --force
          sed -i "s#^DB_DATABASE=.*#DB_DATABASE=${PWD}/database/panel.sqlite#" .env
          touch database/panel.sqlite
          php artisan migrate --force
          php artisan route:list

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PANEL_ADMIN_EMAIL,PANEL_ADMIN_NAME,PANEL_ADMIN_PASSWORD
          script: bash /opt/thirdsan/panel/deploy/deploy.sh
        env:
          PANEL_ADMIN_EMAIL: ${{ secrets.PANEL_ADMIN_EMAIL }}
          PANEL_ADMIN_NAME: ${{ secrets.PANEL_ADMIN_NAME }}
          PANEL_ADMIN_PASSWORD: ${{ secrets.PANEL_ADMIN_PASSWORD }}

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://panel.thirdsan.com/up || echo 000)
            if [ "$status" = "200" ]; then
              echo "panel.thirdsan.com is up (HTTP $status)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $status, retrying in 5s..."
            sleep 5
          done
          echo "panel.thirdsan.com did not return 200 after deploy"
          exit 1
